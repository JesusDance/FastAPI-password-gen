<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/bootstrap.min.css') }}"/>
</head>
<body>
<div class="d-flex flex-column align-items-center justify-content-center vh-100">
<h1>
    Password generator
</h1>

<form method="post"
      action="/gen"
      style="width: 500px">

    <div class="input-group mb-3">
    <label for="name" class="input-group-text" style="width: 95px">Username</label>
    <input id="name"
           class="form-control"
           type="text"
           name="username"
           placeholder="Input your name...">
    </div>

    <div class="input-group mb-3">
    <label for="pass" class="input-group-text" style="width: 95px">Password</label>
    <input id="pass"
           class="form-control"
           type="text"
           name="password"
           placeholder="Input your password...">
    </div>

    <div class="text-center mb-3">
        <button type="submit" class="btn btn-primary fw-bold">Generate password</button>
    </div>

    <div  class="justify-content-center text-center">
    {% if my_password %}
        <p class="text-success">{{ my_password }}</p>
    {% else %}
        <p class="text-warning">{{ error }}</p>
    {% endif %}
    </div>
</form>
</div>
</body>
</html>
